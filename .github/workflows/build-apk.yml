name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: android-actions/setup-android@v3

      - name: Setup SDK
        run: yes | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>&1

      - name: Set version & build web
        run: |
          npm version 1.0.${{ github.run_number }} --no-git-tag-version
          npm ci
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          npm run build 2>&1

      - name: Gradle build
        run: |
          npx cap sync android 2>&1
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle.log
          exit ${PIPESTATUS[0]}

      - name: Find APK
        if: success() || failure()
        run: |
          echo "=== Looking for APK ==="
          find android -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Gradle log tail ==="
          tail -50 android/gradle.log 2>/dev/null || echo "No gradle.log"

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: android/gradle.log
          retention-days: 3

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coderdy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          overwrite: true

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && success()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: "**Coderdy Attendance APK** — v1.0.${{ github.run_number }}
            Auto-built from commit ${{ github.sha }}
            🔽 Download APK from the Artifacts section above if release upload failed."
          make_latest: true
          fail_on_unmatched_files: false
